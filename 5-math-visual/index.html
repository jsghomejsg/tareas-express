<div id="resultZone" class="hidden glass p-6 rounded-[2.5rem] mb-10 border-2 border-cyan-500 shadow-[0_0_20px_rgba(0,242,255,0.2)] text-center animate-bounce">
        <h4 class="cyber-font text-cyan-400 text-sm mb-3 uppercase">¡Análisis Completado!</h4>
        <button onclick="downloadResult()" class="w-full bg-white text-black p-4 rounded-xl font-black uppercase text-sm flex items-center justify-center gap-2">
            <i class="fas fa-file-download"></i> Descargar Solución PDF
        </button>
    </div>

    <script>
        let generatedBlobUrl = "";

        function handleImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('previewImg');
                const placeholder = document.getElementById('placeholder');
                const scanner = document.getElementById('scannerLine');
                const resultZone = document.getElementById('resultZone');

                // Reset y Visual
                resultZone.classList.add('hidden');
                placeholder.style.display = 'none';
                img.src = e.target.result;
                img.style.display = 'block';
                scanner.style.display = 'block';

                // Simulamos proceso de 3 segundos
                setTimeout(() => {
                    // 1. Abrir Publicidad (Smartlink)
                    window.open("https://www.effectivegatecpm.com/wzxr3v2n?key=929f1c37198c48ca1ad827c5ebbc7964", '_blank');
                    
                    // 2. Preparar el archivo para descarga manual
                    const resultText = `MATH-VISUAL REPORT\n============================\nRESULTADO DE INTEGRAL: x^3 + x^2 - 5x + C\n\nEl sistema ha detectado los pasos lógicos.`;
                    const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
                    generatedBlobUrl = window.URL.createObjectURL(blob);
                    
                    // 3. Mostrar el botón de descarga (Esto no lo bloquea el móvil)
                    scanner.style.display = 'none';
                    resultZone.classList.remove('hidden');
                    
                    // Intentar descarga automática de respaldo
                    downloadResult();
                }, 3000);
            };
            reader.readAsDataURL(file);
        }

        function downloadResult() {
            if (generatedBlobUrl) {
                const a = document.createElement('a');
                a.href = generatedBlobUrl;
                a.download = "Solucion_Math_Captura.txt";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        // Lógica PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installAppBtn');
            if(installBtn) installBtn.classList.remove('hidden');
        });
    </script>
