<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Dash | Tareas-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; font-family: sans-serif; touch-action: manipulation; }
        canvas { display: block; margin: 0 auto; background: linear-gradient(to bottom, #020617, #1e1b4b); }
        .ui-overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .btn-play { background: #00f2ff; color: #000; font-weight: 900; padding: 20px 40px; border-radius: 20px; text-transform: uppercase; font-size: 1.5rem; box-shadow: 0 0 30px rgba(0,242,255,0.4); }
    </style>
</head>
<body>

    <div id="menu" class="ui-overlay">
        <h1 class="text-5xl font-black text-white mb-8 italic tracking-tighter text-center">GRAVITY<br><span class="text-cyan-400 text-6xl">DASH</span></h1>
        <button onclick="startGame()" class="btn-play">¡JUGAR!</button>
        <p class="text-cyan-500/50 text-[10px] mt-8 font-bold tracking-widest uppercase">Toca para saltar</p>
    </div>

    <div id="gameOver" class="ui-overlay hidden bg-black/80">
        <h2 class="text-4xl font-black text-red-500 mb-4">HAS MUERTO</h2>
        <div id="scoreDisplay" class="text-white text-xl mb-8 font-mono">Puntos: 0</div>
        <button onclick="location.reload()" class="btn-play">REINTENTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('gameOver');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameRunning = false;
        let score = 0;
        let speed = 5;
        
        const player = { x: 50, y: 0, w: 30, h: 30, dy: 0, jumpPower: -12, gravity: 0.6, grounded: false };
        let obstacles = [];

        function startGame() {
            menu.style.display = 'none';
            gameRunning = true;
            player.y = canvas.height / 2;
            requestAnimationFrame(update);
        }

        function createObstacle() {
            if (Math.random() < 0.02) {
                obstacles.push({ x: canvas.width, y: canvas.height - 50, w: 30, h: 50, color: '#ff0055' });
            }
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Suelo
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 2);

            // Jugador (Cubo)
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height - 20) {
                player.y = canvas.height - 20 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            // Obstáculos
            createObstacle();
            obstacles.forEach((obs, index) => {
                obs.x -= speed;
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

                // Colisión
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    endGame();
                }

                if (obs.x + obs.w < 0) {
                    obstacles.splice(index, 1);
                    score++;
                    speed += 0.05;
                }
            });

            // Puntuación
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Inter";
            ctx.fillText(`SCORE: ${score}`, 20, 40);

            requestAnimationFrame(update);
        }

        function endGame() {
            gameRunning = false;
            gameOverScreen.style.display = 'flex';
            document.getElementById('scoreDisplay').innerText = `Puntos: ${score}`;
        }

        window.addEventListener('touchstart', () => {
            if (player.grounded && gameRunning) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        });
        
        window.addEventListener('mousedown', () => {
            if (player.grounded && gameRunning) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        });
    </script>
</body>
</html>
