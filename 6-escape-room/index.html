<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Zero | Escape Room | Tareas-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background-color: #02040a; color: #00f2ff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .room-container { position: relative; height: 75vh; width: 100%; border: 2px solid #00f2ff22; border-radius: 20px; background: radial-gradient(circle at center, #0a101f 0%, #02040a 100%); overflow: hidden; }
        .interactive { position: absolute; cursor: pointer; transition: all 0.3s; z-index: 10; }
        .interactive:hover { filter: drop-shadow(0 0 10px #00f2ff); transform: scale(1.1); }
        .inventory { height: 15vh; background: rgba(15, 23, 42, 0.9); border-top: 2px solid #00f2ff44; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .inv-slot { width: 60px; height: 60px; border: 1px dashed #00f2ff44; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(0,0,0,0.3); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .puzzle-box { background: #0a101f; border: 2px solid #00f2ff; padding: 30px; border-radius: 25px; text-align: center; max-width: 320px; width: 100%; }
        .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .key-btn { background: #1e293b; padding: 18px; border-radius: 12px; font-weight: bold; border: 1px solid #00f2ff22; }
    </style>
</head>
<body class="p-4 flex flex-col justify-between">

    <div class="flex justify-between items-center mb-4 px-2">
        <div>
            <span id="levelLabel" class="text-[10px] text-cyan-500/50 font-black uppercase tracking-[0.3em]">Sector 01</span>
            <h2 class="text-lg font-black italic tracking-tighter">PROTOCOL_ZERO</h2>
        </div>
        <button onclick="requestHint()" class="bg-cyan-900/40 border border-cyan-500/50 text-cyan-400 px-4 py-2 rounded-xl text-[10px] font-black">PISTA</button>
    </div>

    <div id="scene1" class="room-container">
        <div class="interactive top-[35%] left-[50%] -translate-x-1/2 text-5xl opacity-30 animate-pulse" onclick="openKeypad()"><i class="fas fa-microchip"></i></div>
        <div class="interactive bottom-[15%] right-[15%] text-4xl text-slate-800" onclick="inspectDrawer()"><i class="fas fa-folder-closed"></i></div>
        <div class="interactive top-[15%] right-[15%] text-3xl text-slate-800" onclick="inspectVent()"><i class="fas fa-bars"></i></div>
    </div>

    <div id="scene2" class="room-container hidden">
        <div class="interactive top-[20%] left-[10%] text-4xl text-cyan-900" id="powerBox" onclick="inspectPower()"><i class="fas fa-bolt"></i></div>
        <div class="interactive bottom-[20%] left-[50%] -translate-x-1/2 text-6xl text-slate-800" onclick="inspectVault()"><i class="fas fa-vault"></i></div>
        <div class="interactive top-[10%] right-[10%] text-2xl text-slate-700" onclick="inspectMirror()"><i class="fas fa-window-maximize"></i></div>
    </div>

    <div class="inventory mt-4 rounded-2xl">
        <div class="inv-slot" id="slot1"></div>
        <div class="inv-slot" id="slot2"></div>
        <p class="ml-auto text-[9px] text-slate-500 uppercase font-black">Inventario</p>
    </div>

    <div class="overlay" id="keypadModal">
        <div class="puzzle-box">
            <div id="display" class="bg-black/60 p-4 mb-4 text-2xl tracking-[12px] font-black h-16 flex items-center justify-center border border-cyan-500/40 rounded-xl">____</div>
            <div class="keypad-grid" id="gridButtons">
                </div>
            <button onclick="closeModals()" class="mt-8 text-[10px] text-slate-600 font-black uppercase">Cancelar</button>
        </div>
    </div>

    <div class="overlay" id="msgModal">
        <div class="puzzle-box">
            <p id="msgContent" class="text-xs leading-relaxed text-slate-300"></p>
            <button onclick="closeModals()" class="mt-8 bg-cyan-500 text-black px-10 py-3 rounded-xl font-black text-[10px]">Cerrar</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let inventory = [];
        let currentCode = "";
        
        // --- NIVEL 1 ---
        function inspectDrawer() {
            if(!inventory.includes('nota')) {
                inventory.push('nota');
                document.getElementById('slot1').innerHTML = '<i class="fas fa-sticky-note text-yellow-400"></i>';
                showMsg("Nota encontrada: 'El sistema es binario (10 bits)'.");
            }
        }
        function inspectVent() { showMsg("Grabado en la pared: '_ _ 2 4'"); }

        // --- NIVEL 2 (NUEVO) ---
        function inspectPower() {
            if(!inventory.includes('fusible')) {
                showMsg("La caja de energía está abierta. Falta un componente cilíndrico.");
            } else {
                showMsg("Has colocado el fusible. Se oye un zumbido... Una luz brilla en el espejo.");
                inventory.push('power_on');
            }
        }
        function inspectMirror() {
            if(inventory.includes('power_on')) showMsg("La luz proyecta un número en el cristal: '77'");
            else showMsg("Un espejo sucio. No se ve nada.");
        }
        function inspectVault() {
            if(!inventory.includes('fusible')) {
                inventory.push('fusible');
                document.getElementById('slot2').innerHTML = '<i class="fas fa-battery-full text-green-400"></i>';
                showMsg("¡Has encontrado un Fusible tirado junto a la caja fuerte!");
            } else {
                openKeypad(); // El código final será 77 + algo
            }
        }

        // --- SISTEMA CORE ---
        function openKeypad() {
            document.getElementById('gridButtons').innerHTML = '';
            for(let i=1; i<=9; i++) {
                document.getElementById('gridButtons').innerHTML += `<button class="key-btn" onclick="press('${i}')">${i}</button>`;
            }
            document.getElementById('gridButtons').innerHTML += `<button class="key-btn text-red-500" onclick="resetKeypad()">C</button><button class="key-btn" onclick="press('0')">0</button><button class="key-btn text-green-500" onclick="checkCode()">OK</button>`;
            document.getElementById('keypadModal').style.display = 'flex';
        }

        function press(n) { if(currentCode.length < 4) { currentCode += n; updateDisplay(); } }
        function resetKeypad() { currentCode = ""; updateDisplay(); }
        function updateDisplay() { document.getElementById('display').innerText = currentCode.padEnd(4, '_'); }

        function checkCode() {
            if(currentLevel === 1 && currentCode === "1024") {
                currentLevel = 2; resetKeypad(); closeModals();
                document.getElementById('scene1').classList.add('hidden');
                document.getElementById('scene2').classList.remove('hidden');
                document.getElementById('levelLabel').innerText = "Sector 02";
                showMsg("Protocolo 1 superado. Has entrado en el Búnker de Energía.");
            } else if(currentLevel === 2 && currentCode === "0077") {
                showMsg("¡LIBERTAD! Has completado el Protocolo Zero. Eres un maestro del escape.");
            } else {
                alert("ERROR"); resetKeypad();
            }
        }

        function showMsg(t) { document.getElementById('msgContent').innerText = t; document.getElementById('msgModal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'); }
        
        function requestHint() {
            alert(currentLevel === 1 ? "Pista: 2 elevado a 10 + lo que viste en la rejilla." : "Busca el fusible, ponlo en la luz y mira el espejo.");
        }
    </script>
</body>
</html>
