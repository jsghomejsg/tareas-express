    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card-grad { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">Tareas-Express</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase">Herramientas Premium</p>
        </div>
        <button id="installBtn" class="hidden bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-black shadow-lg animate-bounce">
            <i class="fas fa-download mr-1"></i> INSTALAR APP
        </button>
    </header>

    <div class="flex justify-center mb-8 min-h-[250px] bg-slate-900/50 rounded-2xl items-center border border-dashed border-slate-700">
        <script type="text/javascript">
            atOptions = {'key' : '6879ae15e3c0022ec1df6fe4a4eb64b7','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/6879ae15e3c0022ec1df6fe4a4eb64b7/invoke.js"></script>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <a href="1-apuntes-a-mano/index.html" class="glass p-4 rounded-3xl flex items-center border border-white/5">
            <div class="w-12 h-12 card-grad rounded-xl flex items-center justify-center text-xl mr-4 shadow-lg shadow-purple-500/20">
                <i class="fas fa-pen-nib text-white"></i>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Apuntes a Mano</h3>
                <p class="text-slate-400 text-[10px] italic font-medium">De digital a papel real</p>
            </div>
            <i class="fas fa-chevron-right text-slate-600 text-xs"></i>
        </a>

        <a href="2-humanizador-texto/index.html" class="glass p-4 rounded-3xl flex items-center border border-white/5">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-xl mr-4">
                <i class="fas fa-user-check text-white"></i>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-sm">Humanizador IA</h3>
                <p class="text-slate-400 text-[10px] italic font-medium">Bypass detectores</p>
            </div>
            <i class="fas fa-chevron-right text-slate-600 text-xs"></i>
        </a>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });
    </script>
