    <script>
        // Lógica de Instalación PWA
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Evitar que el navegador muestre el prompt automático
            e.preventDefault();
            // Guardar el evento para usarlo después
            deferredPrompt = e;
            // Mostrar nuestro botón personalizado
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Mostrar el prompt de instalación
                deferredPrompt.prompt();
                // Esperar a la respuesta del usuario
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Usuario aceptó la instalación');
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // Registrar el Service Worker (sw.js)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registrado con éxito:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW fallo en el registro:', error);
                    });
            });
        }

        // Detectar si ya está instalada la App
        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            deferredPrompt = null;
            console.log('App instalada con éxito');
        });
    </script>
