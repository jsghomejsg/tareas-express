<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuntes a Mano | Tareas-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Gloria+Hallelujah&family=Indie+Flower&family=Shadows+Into+Light&display=swap');
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* ESTILOS DE PAPEL */
        .paper-container { background: white; padding: 40px; border-radius: 2px; min-height: 500px; }
        
        /* Papel de Rayas */
        .p-rayas { 
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
        }
        /* Papel de Cuadros */
        .p-cuadros { 
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            line-height: 20px;
        }
        /* Folio Blanco */
        .p-blanco { background-image: none; line-height: 1.6; }

        .paper-content { color: #1a365d; font-size: 1.4rem; word-wrap: break-word; white-space: pre-wrap; }
        .f-1 { font-family: 'Caveat', cursive; }
        .f-2 { font-family: 'Shadows Into Light', cursive; }
        .f-3 { font-family: 'Indie Flower', cursive; }
        .f-4 { font-family: 'Gloria Hallelujah', cursive; }

        .btn-opt { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 12px; font-size: 0.8rem; }
        .btn-opt:active { background: #7c3aed; }
    </style>
</head>
<body class="p-4 pb-32">

    <nav class="flex justify-between items-center mb-6">
        <a href="../index.html" class="bg-slate-800 text-purple-400 px-4 py-2 rounded-full text-xs font-bold border border-slate-700"><i class="fas fa-arrow-left mr-2"></i>Inicio</a>
        <span class="text-[10px] font-black bg-purple-600 px-2 py-1 rounded">MODO REALISTA</span>
    </nav>

    <div class="flex justify-center mb-6 min-h-[250px] bg-slate-900/50 rounded-2xl items-center border border-dashed border-slate-700">
        <script type="text/javascript">
            atOptions = {'key' : '6879ae15e3c0022ec1df6fe4a4eb64b7','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/6879ae15e3c0022ec1df6fe4a4eb64b7/invoke.js"></script>
    </div>

    <div class="glass p-4 rounded-3xl mb-4">
        <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 text-center">1. Elige el tipo de papel</p>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="changeP('p-blanco')" class="btn-opt">Blanco</button>
            <button onclick="changeP('p-rayas')" class="btn-opt">Rayas</button>
            <button onclick="changeP('p-cuadros')" class="btn-opt">Cuadros</button>
        </div>
    </div>

    <div class="glass p-4 rounded-3xl mb-4">
        <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 text-center">2. Elige tu caligrafía</p>
        <div class="grid grid-cols-4 gap-2">
            <button onclick="changeF('f-1')" class="btn-opt f-1 text-lg">Aa</button>
            <button onclick="changeF('f-2')" class="btn-opt f-2 text-lg">Aa</button>
            <button onclick="changeF('f-3')" class="btn-opt f-3 text-lg">Aa</button>
            <button onclick="changeF('f-4')" class="btn-opt f-4 text-lg">Aa</button>
        </div>
    </div>

    <textarea id="ti" class="w-full h-24 glass rounded-2xl p-4 text-white text-sm outline-none mb-6" placeholder="Pega aquí el texto..."></textarea>

    <div id="captureArea" class="mb-10">
        <div id="paperBg" class="paper-container p-rayas">
            <div id="tp" class="paper-content f-1">Escribe algo...</div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6">
        <button onclick="doDL()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-black shadow-2xl active:scale-95 transition-all">
            <i class="fas fa-file-download mr-2"></i>DESCARGAR MI TAREA
        </button>
    </div>

    <script>
        const ti = document.getElementById('ti');
        const tp = document.getElementById('tp');
        const bg = document.getElementById('paperBg');

        ti.addEventListener('input', (e) => { tp.innerText = e.target.value || "Escribe algo..."; });
        function changeF(c) { tp.className = 'paper-content ' + c; }
        function changeP(p) { bg.className = 'paper-container ' + p; }

        async function doDL() {
            if(!ti.value) return alert("Pega un texto.");
            window.open("https://www.effectivegatecpm.com/wzxr3v2n?key=929f1c37198c48ca1ad827c5ebbc7964", '_blank');
            const canvas = await html2canvas(document.getElementById('captureArea'));
            const img = canvas.toDataURL("image/jpeg", 0.9);
            const l = document.createElement('a');
            l.download = 'tarea-real.jpg';
            l.href = img;
            l.click();
        }
    </script>
</body>
</html>
