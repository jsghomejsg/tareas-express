<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuntes a Mano - Tareas-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Gloria+Hallelujah&family=Indie+Flower&family=Shadows+Into+Light&display=swap');
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .paper { 
            background-color: #fff; 
            color: #1a365d; 
            line-height: 1.6;
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 1.6rem;
            border-radius: 4px;
        }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .font-style-1 { font-family: 'Caveat', cursive; }
        .font-style-2 { font-family: 'Shadows Into Light', cursive; }
        .font-style-3 { font-family: 'Indie Flower', cursive; }
        .font-style-4 { font-family: 'Gloria Hallelujah', cursive; }
        .ad-container { min-height: 250px; background: rgba(255,255,255,0.03); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 pb-24">

    <nav class="flex justify-between items-center mb-4">
        <a href="../index.html" class="text-purple-400 font-bold flex items-center gap-2 bg-purple-900/20 px-4 py-2 rounded-full border border-purple-500/30">
            <i class="fas fa-arrow-left"></i> Inicio
        </a>
        <div class="text-right">
            <span class="block text-[10px] text-slate-500 uppercase font-black">Herramienta</span>
            <span class="text-xs font-bold text-white bg-purple-600 px-2 py-0.5 rounded">CALIGRAFÍA IA</span>
        </div>
    </nav>

    <header class="text-center mb-6">
        <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">PASAR A MANO</h1>
        <p class="text-slate-400 text-xs">Convierte tus apuntes digitales en folios reales</p>
    </header>

    <div class="ad-container mb-8">
        <script type="text/javascript">
            atOptions = {'key' : '6879ae15e3c0022ec1df6fe4a4eb64b7','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/6879ae15e3c0022ec1df6fe4a4eb64b7/invoke.js"></script>
    </div>

    <div class="glass p-5 rounded-3xl mb-6 shadow-xl">
        <label class="block text-[10px] font-bold text-purple-400 mb-4 uppercase text-center tracking-widest">Elige tu Caligrafía</label>
        <div class="grid grid-cols-4 gap-3">
            <button onclick="changeFont('font-style-1')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-lg font-style-1 hover:border-purple-500 transition-all focus:ring-2 focus:ring-purple-500">Ab</button>
            <button onclick="changeFont('font-style-2')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-lg font-style-2 hover:border-purple-500 transition-all focus:ring-2 focus:ring-purple-500">Ab</button>
            <button onclick="changeFont('font-style-3')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-lg font-style-3 hover:border-purple-500 transition-all focus:ring-2 focus:ring-purple-500">Ab</button>
            <button onclick="changeFont('font-style-4')" class="bg-slate-800 border border-slate-700 p-3 rounded-xl text-lg font-style-4 hover:border-purple-500 transition-all focus:ring-2 focus:ring-purple-500">Ab</button>
        </div>
    </div>

    <div class="glass p-4 rounded-3xl mb-6">
        <textarea id="inputText" class="w-full h-32 bg-transparent border-none text-white text-sm outline-none resize-none" placeholder="Pega aquí el texto de ChatGPT o de tus apuntes..."></textarea>
    </div>

    <div id="captureArea" class="mb-8">
        <div id="paperPreview" class="paper p-10 shadow-2xl min-h-[500px] text-2xl font-style-1">
            Escribe algo arriba para empezar...
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6">
        <button onclick="processDownload()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-black text-lg shadow-2xl shadow-purple-900/40 active:scale-95 transition-all border-b-4 border-purple-800">
            <i class="fas fa-file-download mr-2"></i> DESCARGAR JPG
        </button>
    </div>

    <script>
        const input = document.getElementById('inputText');
        const preview = document.getElementById('paperPreview');

        input.addEventListener('input', (e) => {
            preview.innerText = e.target.value || "Escribe algo arriba para empezar...";
        });

        function changeFont(fontClass) {
            preview.className = 'paper p-10 shadow-2xl min-h-[500px] text-2xl ' + fontClass;
        }

        async function processDownload() {
            if(!input.value) return alert("¡Ey! Primero pega el texto que quieres pasar a mano.");
            window.open("https://www.effectivegatecpm.com/wzxr3v2n?key=929f1c37198c48ca1ad827c5ebbc7964", '_blank');
            const canvas = await html2canvas(document.getElementById('captureArea'));
            const image = canvas.toDataURL("image/jpeg", 0.9);
            const link = document.createElement('a');
            link.download = 'mi-tarea-a-mano.jpg';
            link.href = image;
            link.click();
        }
    </script>
</body>
</html>
